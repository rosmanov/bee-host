name: Cross-Platform Build

on:
  push:
    branches: [master, main]
    tags: ["[0-9]*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish to AUR"
        required: true
        type: string

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, i386, arm, aarch64, ppc64le]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make git build-essential rpm
          if [ "${{ matrix.arch }}" = "i386" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gcc-multilib g++-multilib libc6-dev:i386
          elif [ "${{ matrix.arch }}" = "arm" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          elif [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          elif [ "${{ matrix.arch }}" = "ppc64le" ]; then
            sudo apt-get install -y gcc-powerpc64le-linux-gnu g++-powerpc64le-linux-gnu
          fi

      - name: Build and Package
        run: |
          ./build.sh CMake/Toolchain-Linux-${{ matrix.arch }}.cmake -b Release -d build/linux-${{ matrix.arch }}

      - name: Upload Artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            build/linux-${{ matrix.arch }}/*.rpm
            build/linux-${{ matrix.arch }}/*.deb
            build/linux-${{ matrix.arch }}/*.tar.gz
            build/linux-${{ matrix.arch }}/*.tgz

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build/macos-${{ matrix.arch }} -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DPACKAGE_ARCH=${{ matrix.arch }} \
            -DCPACK_GENERATOR=productbuild

      - name: Build
        run: |
          cmake --build build/macos-${{ matrix.arch }} --config Release

      - name: Package
        run: |
          cd build/macos-${{ matrix.arch }}
          cpack -C Release

      - name: Upload Artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            build/macos-${{ matrix.arch }}/*.pkg

  build-windows:
    name: Build Windows (${{ matrix.cpu }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cpu: amd64
          - arch: ARM64
            cpu: arm64
          - arch: Win32
            cpu: i686
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NSIS
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Check NSIS
        run: |
          makensis /VERSION
        shell: pwsh

      - name: Install ARM64 compiler tools
        if: matrix.arch == 'ARM64'
        run: |
          choco install visualstudio2022-workload-vctools `
            --package-parameters "--add Microsoft.VisualStudio.Component.VC.Tools.ARM64" `
            -y
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build-win-${{ matrix.cpu }} -S . `
            -A ${{ matrix.arch }} `
            -DCPACK_GENERATOR="NSIS;ZIP" `
            -DPACKAGE_ARCH=${{ matrix.cpu }} `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
        shell: pwsh

      - name: Build
        run: |
          cmake --build build-win-${{ matrix.cpu }} --config Release
        shell: pwsh

      - name: Package
        run: |
          cd build-win-${{ matrix.cpu }}
          cpack -C Release
        shell: pwsh

      - name: Upload Artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.cpu }}
          path: |
            build-win-${{ matrix.cpu }}/*.zip
            build-win-${{ matrix.cpu }}/*.exe

  update-aur:
    name: Update AUR package
    needs:
      - build-linux
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git openssh pacman-contrib

          useradd -m builder -d /home/builder

          mkdir -p /home/builder/.ssh
          chmod 700 /home/builder/.ssh

      - name: Configure SSH
        run: |
          printf "%s\n" "${{ secrets.AUR_SSH_KEY }}" > /home/builder/.ssh/id_ed25519
          chmod 600 /home/builder/.ssh/id_ed25519

          # Pin SSH fingerprint to the value taken from https://aur.archlinux.org/ rather than relying on
          # ssh-keyscan aur.archlinux.org >> /home/builder/.ssh/known_hosts
          printf '%s\n' 'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN' > /home/builder/.ssh/known_hosts
          chmod 644 /home/builder/.ssh/known_hosts

          chown -R builder:builder /home/builder/.ssh

      - name: Clone AUR repository
        run: |
          runuser -u builder -- env HOME=/home/builder git clone ssh://aur@aur.archlinux.org/beectl.git /home/builder/aur

      - name: Update PKGBUILD
        working-directory: /home/builder/aur
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          # Support both tag styles: 1.2.3 and v1.2.3
          pkgver="${VERSION#v}"
          sed -i -E "s|^pkgver=.*|pkgver=${pkgver}|" PKGBUILD
          sed -i -E 's|^pkgrel=.*|pkgrel=1|' PKGBUILD

      - name: Update checksums
        working-directory: /home/builder/aur
        run: |
          runuser -u builder -- updpkgsums

      - name: Verify source
        working-directory: /home/builder/aur
        run: |
          runuser -u builder -- makepkg --verifysource

      - name: Regenerate .SRCINFO
        working-directory: /home/builder/aur
        run: |
          runuser -u builder -- sh -c 'makepkg --printsrcinfo > .SRCINFO'

      - name: Commit and push
        working-directory: /home/builder/aur
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          runuser -u builder -- env HOME=/home/builder sh -c "$(cat <<-SCRIPT
            cd "$GITHUB_WORKSPACE/aur"

            git config user.name "Ruslan Osmanov"
            git config user.email "608192+rosmanov@users.noreply.github.com"

            git add PKGBUILD .SRCINFO

            if git diff --cached --quiet; then
              echo "Nothing changed."
              exit 0
            fi

            git commit -m "Update to ${VERSION}"
            git push
          SCRIPT
          )"

  create-release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Get the release notes from the tag message
          TAG_MESSAGE=$(git tag -l --format='%(contents)' $VERSION)
          # If no message, fall back to commit message
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE=$(git log -1 --pretty=%B $VERSION)
          fi

          # Create the release
          # Upload all files found in artifacts directory
          files=$(find artifacts -type f)
          if [ -z "$files" ]; then
              echo "No artifacts found!"
              exit 1
          fi
          
          gh release create $VERSION \
            --title "Release $VERSION" \
            --notes "$TAG_MESSAGE" \
            $files

